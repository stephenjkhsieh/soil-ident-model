# ==========================================
# 資料集與路徑設定 (Dataset & Paths)
# ==========================================
data_dir: ./soil-ident_data
train_split: feedback
val_split: feedback_testing
num_classes: 6
# class_map: ./my_class_map.txt
dataset: ''

# ==========================================
# 模型與基礎設定 (Model Basics)
# ==========================================
model: mobilenetv4_hybrid_medium.ix_e550_r384_in1k
pretrained: true
img_size: 384
in_chans: 3
drop: 0.2
drop_path: 0.1
model_ema: true
model_ema_decay: 0.9999
model_ema_warmup: true

# ==========================================
# 硬體與效能加速 (Hardware & Performance)
# ==========================================
device: cuda
batch_size: 1024             # 96GB VRAM 充足，大 Batch Size 能穩定極端不平衡的梯度
workers: 20                 # 加快 13 萬張圖的 I/O 讀取
amp: true
amp_dtype: bfloat16         # Blackwell 架構原生支援，防溢位且加速
torchcompile: inductor      # PyTorch 2.x 編譯加速
grad_accum_steps: 1
sync_bn: false

# ==========================================
# 訓練週期與評估 (Epochs & Evaluation)
# ==========================================
epochs: 60                  # Fine-tuning 階段一，只需看懂表徵，不需要 550 epochs
start_epoch: 0
eval_metric: macro_f1       # 需配合前面修改的 train.py，以 Macro F1 決定最佳模型
patience_epochs: 10
checkpoint_hist: 10          # 保留最近 10 個最佳 Checkpoints

# ==========================================
# 優化器與學習率 (Optimizer & LR Scheduler)
# ==========================================
opt: adamw
opt_betas:
- 0.9
- 0.99
weight_decay: 0.05          # 降低 WD，避免過度遺忘預訓練的 ImageNet 紋理特徵
sched: cosine
sched_on_updates: true
lr_base: 0.0005             # Fine-tuning 學習率需大幅降低 (預設是 0.002)
min_lr: 1.0e-06
warmup_epochs: 3            # 縮短 Warmup 時間
warmup_lr: 1.0e-06

# ==========================================
# 資料增強 (Data Augmentation) - 保護 260 張少數類的防線
# ==========================================
aa: rand-m9-inc1-mstd1.0
color_jitter: 0.4
hflip: 0.5
vflip: 0.5                  # 土壤沒有絕對的上下方向，開啟垂直翻轉增加樣本多樣性
train_interpolation: random
mixup: 0.8
cutmix: 1.0
mixup_prob: 0.5             # 確保每個 Batch 都有 Mixup/Cutmix，防止死記少數類
mixup_mode: batch
mixup_switch_prob: 0.5
smoothing: 0.1              # Label Smoothing，讓決策邊界更平滑
reprob: 0.3                 # Random Erasing，模擬土壤被遮擋的情境
remode: pixel

# ==========================================
# 實驗追蹤 (Logging & Tracking)
# ==========================================
log_wandb: true
wandb_project: soil-classification-phase1
log_interval: 50
experiment: mnv4_hm_phase1_finetune
output: ./output/

















